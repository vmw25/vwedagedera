{{ $branding := partialCached "functions/get_branding" . "branding" }}
{{ $page := . }}

<header id="site-header">
  <nav class="simple-nav" aria-label="Primary navigation">
    <a class="simple-nav__brand" href="{{ site.Home.RelPermalink }}">{{ $branding.name }}</a>

    <button class="simple-nav__toggle" type="button" aria-expanded="false" aria-controls="simple-nav-menu" aria-label="Toggle navigation" onclick="toggleSimpleNavigation(this)">
      <span class="simple-nav__toggle-icon" aria-hidden="true"></span>
    </button>

    <ul class="simple-nav__menu" id="simple-nav-menu">
      {{ range site.Menus.main }}
        {{ $url := .URL }}
        {{ if not (findRE `^https?://` .URL) }}{{ $url = .URL | relLangURL }}{{ end }}
        <li>
          <a href="{{ $url }}"{{ if eq $page.RelPermalink $url }} class="active" aria-current="page"{{ end }}{{ if findRE `^https?://` .URL }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Name }}</a>
        </li>
      {{ end }}
    </ul>
  </nav>
</header>

<script>
  function toggleSimpleNavigation(button) {
    const menu = document.getElementById(button.getAttribute('aria-controls'));
    const isOpen = button.getAttribute('aria-expanded') === 'true';
    button.setAttribute('aria-expanded', String(!isOpen));
    menu.classList.toggle('is-open', !isOpen);
  }
</script>
