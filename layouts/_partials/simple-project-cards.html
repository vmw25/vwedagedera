<div class="simple-project-list">
  {{ range .projects }}
    <article class="simple-project-card">
      <a href="{{ .RelPermalink }}">
        <h3>{{ .Title }}</h3>
        {{ with .Params.summary }}<p>{{ . }}</p>{{ end }}
        <span class="simple-project-card__link">Read project <span aria-hidden="true">→</span></span>
      </a>
    </article>
  {{ end }}
</div>
